<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>BareDOM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="DOM.js"></script>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      font-family: system-ui;
      max-width: 800px;
      margin: 2rem auto;
      line-height: 1.6;
    }
  </style>
</head>
<body>
<script>

Element.prototype.fetch = async function (url, func) {
  const res = await fetch(url, options);
  const text = await res.text();
  if(func) text = await func(text);
  this.innerHTML = text;
  if(options.callback) options.callback();
};

DOM.set();

document.body.fetch('./README.md', md => marked.parse(md));

</script>

</body>
</html>
