<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>BareDOM</title>
  <meta name="viewport" mainContent="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/{DOM}_icon.png">
  <link rel="stylesheet" href="style.css">
  <script src="DOM.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <script>
    // Initialize reactive variables for main content and sample code
    Binder.set(window, {
      mainContent: '...loading',
      sampleCode: false,
    });

    // Set up the basic structure of the page
    DOM.set({
      header: {
        img: {
          height: 100,
          src: '/{DOM}.png',
          alt: 'BareDOM Logo',
        },
      },
      main: {
        content: _mainContent,
      },
      aside: {
        display: _sampleCode.as(v => v ? 'flex' : 'none'),
        onclick: () => sampleCode = false,
        a_close: {
          ariaLabel: 'Close Sample',
          onclick: () => sampleCode = false,
        },
        iframe: {
          srcdoc: _sampleCode.as(code =>
            `<html><head><script src="DOM.js"><\/script><\/head><body><script>let someElement=DOM.let({},true);${code}<\/script><\/body><\/html>`
          ),
          onclick: e => e.stopPropagation(),
        }
      },
      footer: {
        p: {
          span: [
            'Made by ', {
              tag: 'a',
              href: 'http://lenino.net',
              text: 'Lenin Comprés',
              target: '_blank',
            }, ' using BareDOM.'
          ]
        },
      },
    });

    fetch('./README.md').then(res => res.text()).then(md => {
      // Convert Markdown to HTML and set it as the main content
      mainContent = marked.parse(md);

      // Add "Run Sample" buttons to JavaScript code blocks
      DOM.get('pre').forEach(pre => {
        if (!pre.get('.language-js, .language-javascript')) return;
        pre.set({
          position: 'relative',
          a_run: {
            ariaLabel: 'Run Sample',
            onclick: () => sampleCode = pre.textContent,
          }
        })
      });
    });
  </script>
</body>

</html>
